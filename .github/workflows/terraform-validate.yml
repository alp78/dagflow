name: Terraform Validate

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env_dir: [dev, test, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        run: terraform -chdir=infra/terraform/envs/${{ matrix.env_dir }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra/terraform/envs/${{ matrix.env_dir }} validate
