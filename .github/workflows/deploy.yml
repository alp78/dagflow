name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Terraform environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        run: terraform -chdir=infra/terraform/envs/${{ inputs.environment }} init

      - name: Terraform plan
        run: terraform -chdir=infra/terraform/envs/${{ inputs.environment }} plan
