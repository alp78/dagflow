# Generated by ops/scripts/sync_config.py — do not edit manually.
# Edit config.json at the repo root, then run: make sync-config

services:
  dagster-user-code-security-shareholder:
    build:
      context: .
      dockerfile: apps/dagster/Dockerfile
    command: >
      dagster api grpc
      -h 0.0.0.0
      -p 4000
      -m dagflow_security_shareholder.definitions
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@pgbouncer:6432/dagflow}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/dagflow}
      DAGSTER_HOME: /opt/dagster/dagster_home
      DBT_PROFILES_DIR: /workspace/dbt
      LANDING_ROOT_DIR: /workspace/workflows/security_shareholder/source_landing
      EXPORT_ROOT_DIR: /workspace/workflows/security_shareholder/generated_exports
      EDGAR_IDENTITY: ${EDGAR_IDENTITY:-Dagflow local dev support@dagflow.local}
      SEC_13F_LOOKBACK_DAYS: ${SEC_13F_LOOKBACK_DAYS:-14}
      SEC_13F_FILING_LIMIT: ${SEC_13F_FILING_LIMIT:-50}
      SEC_SECURITY_FOCUS_LIMIT: ${SEC_SECURITY_FOCUS_LIMIT:-80}
      OPENFIGI_API_KEY: ${OPENFIGI_API_KEY}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      MINIO_SECURE: ${MINIO_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - .:/workspace
      - dagster-home:/opt/dagster/dagster_home
