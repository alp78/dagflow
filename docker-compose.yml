services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dagflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dagflow}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  pgbouncer:
    build:
      context: .
      dockerfile: ops/compose/pgbouncer/Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dagflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      PGBOUNCER_POOL_MODE: ${PGBOUNCER_POOL_MODE:-transaction}
      PGBOUNCER_MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-200}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-20}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@pgbouncer:6432/dagflow}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/dagflow}
      BUSINESS_TIMEZONE: ${BUSINESS_TIMEZONE:-UTC}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      MINIO_SECURE: ${MINIO_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - .:/workspace

  dagster-user-code:
    build:
      context: .
      dockerfile: apps/dagster/Dockerfile
    command: >
      dagster api grpc
      -h 0.0.0.0
      -p 4000
      -m dagflow_dagster.definitions
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@pgbouncer:6432/dagflow}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/dagflow}
      DAGSTER_HOME: /opt/dagster/dagster_home
      DBT_PROFILES_DIR: /workspace/dbt
      EDGAR_IDENTITY: ${EDGAR_IDENTITY:-Dagflow local dev support@dagflow.local}
      SEC_13F_LOOKBACK_DAYS: ${SEC_13F_LOOKBACK_DAYS:-14}
      SEC_13F_FILING_LIMIT: ${SEC_13F_FILING_LIMIT:-50}
      SEC_SECURITY_FOCUS_LIMIT: ${SEC_SECURITY_FOCUS_LIMIT:-80}
      OPENFIGI_API_KEY: ${OPENFIGI_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      MINIO_SECURE: ${MINIO_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - .:/workspace
      - dagster-home:/opt/dagster/dagster_home

  dagster-webserver:
    build:
      context: .
      dockerfile: apps/dagster/Dockerfile
    command: >
      /bin/sh -c
      "cp /workspace/apps/dagster/dagster.yaml /opt/dagster/dagster_home/dagster.yaml
      && dagster-webserver -h 0.0.0.0 -p 3000 -w /workspace/apps/dagster/workspace.yaml"
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@pgbouncer:6432/dagflow}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/dagflow}
      DAGSTER_HOME: /opt/dagster/dagster_home
    depends_on:
      dagster-user-code:
        condition: service_started
    ports:
      - "${DAGSTER_PORT:-3001}:3000"
    volumes:
      - .:/workspace
      - dagster-home:/opt/dagster/dagster_home

  dagster-daemon:
    build:
      context: .
      dockerfile: apps/dagster/Dockerfile
    command: >
      /bin/sh -c
      "cp /workspace/apps/dagster/dagster.yaml /opt/dagster/dagster_home/dagster.yaml
      && dagster-daemon run -w /workspace/apps/dagster/workspace.yaml"
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@pgbouncer:6432/dagflow}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/dagflow}
      DAGSTER_HOME: /opt/dagster/dagster_home
    depends_on:
      dagster-user-code:
        condition: service_started
    volumes:
      - .:/workspace
      - dagster-home:/opt/dagster/dagster_home

  ui:
    build:
      context: .
      dockerfile: apps/ui-react/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-8000}
      VITE_DAGSTER_BASE_URL: http://localhost:${DAGSTER_PORT:-3001}
    depends_on:
      api:
        condition: service_started
      dagster-webserver:
        condition: service_started
    ports:
      - "${UI_PORT:-3000}:3000"
    volumes:
      - .:/workspace

volumes:
  postgres-data:
  minio-data:
  dagster-home:
